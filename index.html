<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Test Portal</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --warning: #f59e0b;
            --dark-sidebar: #1e1e2f;
            --body-bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--body-bg);
            margin: 0;
            padding: 0;
            display: flex;
            min-height: 100vh;
            color: var(--text-main);
        }

        /* SIDEBAR STYLING */
        .sidebar {
            width: 260px;
            background-color: var(--dark-sidebar);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }

        .sidebar-brand {
            padding: 10px 25px 25px 25px;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-menu {
            list-style: none;
            padding: 20px 0;
            margin: 0;
            flex-grow: 1;
        }

        .sidebar-item a {
            display: flex;
            align-items: center;
            padding: 14px 25px;
            color: #b4c6ef;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .sidebar-item.active a, .sidebar-item a:hover {
            color: #ffffff;
            background-color: rgba(255, 255, 255, 0.08);
            border-left: 4px solid var(--primary);
        }

        /* MAIN CONTENT CONTAINERS */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            box-sizing: border-box;
            background-color: var(--body-bg);
            overflow-y: auto;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
            border: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .hidden { display: none !important; }

        /* GRID FOR LAYOUT */
        .admin-grid {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            align-items: start;
        }

        @media (max-width: 992px) {
            .admin-grid { grid-template-columns: 1fr; }
            body { flex-direction: column; }
            .sidebar { width: 100%; }
        }

        /* FORMS & INPUTS */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        input[type="text"], input[type="password"], input[type="number"], select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: #f8fafc;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        /* BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 11px 20px;
            background-color: var(--primary);
            color: white;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: var(--success-hover); }
        .btn-danger { background-color: var(--danger); }
        .btn-danger:hover { background-color: var(--danger-hover); }
        .btn-secondary { background-color: #64748b; }
        .btn-secondary:hover { background-color: #475569; }

        /* TABLES */
        .panel-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            text-align: left;
        }

        .panel-table th, .panel-table td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        .panel-table th {
            background-color: #f8fafc;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .panel-table tbody tr:hover { background-color: #f8fafc; }

        /* BADGES */
        .badge {
            padding: 4px 10px;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 12px;
        }
        .badge-success { background-color: #d1fae5; color: #065f46; }
        .badge-danger { background-color: #fee2e2; color: #991b1b; }

        /* QUIZ STYLING */
        .option-label {
            display: block;
            padding: 16px;
            margin-bottom: 12px;
            background-color: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-label:hover { background-color: #f0fdf4; border-color: var(--success); }
        .option-label input { margin-right: 12px; transform: scale(1.1); }
        #feedback { padding: 16px; border-radius: 8px; font-weight: 600; text-align: center; margin-top: 20px; }
        .correct { background-color: #d1fae5; color: #065f46; }
        .wrong { background-color: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>

    <div id="portal-sidebar" class="sidebar hidden">
        <div class="sidebar-brand">Test Portal</div>
        <ul class="sidebar-menu">
            <li class="sidebar-item active" id="menu-dash-link"><a onclick="sidebarNavigate('dashboard')">Dashboard</a></li>
            <li class="sidebar-item hidden" id="menu-admin-link"><a onclick="sidebarNavigate('admin')">User Directory</a></li>
        </ul>
        <div style="padding: 20px;">
            <button class="btn btn-danger" style="width: 100%;" onclick="logout()">Sign Out</button>
        </div>
    </div>

    <div class="main-content">
        <div class="container">

            <div id="login-view" class="card" style="max-width: 480px; margin: 60px auto 0 auto;">
                <h2 style="font-size: 24px; margin-bottom: 8px;">Portal Login</h2>
                <p style="color: var(--text-muted); margin-bottom: 24px; font-size: 14px;">Please authenticate to access assignments.</p>
                
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" placeholder="Username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="••••••••">
                </div>
                <button class="btn" style="width: 100%; margin-top: 10px;" id="btn-login">Sign In</button>
            </div>

            <div id="dashboard-view" class="hidden">
                <div class="top-bar">
                    <div>
                        <h1 style="margin: 0; font-size: 28px;">Welcome back, <span id="student-name-display">Student</span>!</h1>
                        <p id="access-expiry-notice" style="margin: 5px 0 0 0; color: var(--danger); font-weight: 600; font-size: 14px;"></p>
                    </div>
                </div>

                <div class="card">
                    <h3>Available Evaluations</h3>
                    <p
